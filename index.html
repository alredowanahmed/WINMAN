
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Desi Wingman</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { 
      font-family: 'Poppins', sans-serif; 
      background-color: #050201;
      color: #fff;
      overflow-x: hidden;
      margin: 0;
    }
    .atmosphere {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(circle at 50% 20%, #4a1d17 0%, transparent 60%),
        radial-gradient(circle at 10% 80%, #ff4e00 0%, transparent 50%),
        radial-gradient(circle at 90% 90%, #632100 0%, transparent 40%);
      filter: blur(80px);
      opacity: 0.5;
      z-index: -1;
      pointer-events: none;
      animation: pulse 15s ease-in-out infinite alternate;
    }
    @keyframes pulse {
      0% { opacity: 0.4; transform: scale(1); }
      100% { opacity: 0.6; transform: scale(1.1); }
    }
    .glass-surface {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }
    .text-glow {
      text-shadow: 0 0 20px rgba(255, 78, 0, 0.4);
    }
  </style>
</head>
<body class="bg-black text-white">
  <div class="atmosphere"></div>
  <app-root></app-root>
</body>
</html>
